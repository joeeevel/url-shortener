services:
  - type: web
    name: url-shortener
    runtime: docker
    repo: https://github.com/joeeevel/url-shortener
    branch: master
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: url-shortener-redis
          property: connectionString

databases:
  - name: url-shortener-db
    plan: free
    region: oregon
    databaseName: urlshortener

redis:
  - name: url-shortener-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
